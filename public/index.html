<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שיתוף קבצים ברשת</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      color: #333;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; color: #fff; margin-bottom: 24px; }
    header h1 { font-size: 32px; margin-bottom: 6px; }
    header p { opacity: 0.9; font-size: 14px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .dropzone {
      border: 3px dashed #2a5298;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f7f9fc;
    }
    .dropzone.dragover { background: #e3f0ff; border-color: #1e3c72; transform: scale(1.01); }
    .dropzone .icon { font-size: 48px; margin-bottom: 12px; }
    .dropzone p { color: #555; font-size: 16px; }
    .dropzone small { color: #999; display: block; margin-top: 8px; }
    #fileInput { display: none; }
    .progress { height: 8px; background: #eee; border-radius: 4px; margin-top: 16px; overflow: hidden; display: none; }
    .progress-bar { height: 100%; width: 0; background: #2a5298; transition: width 0.2s; }
    h2 { font-size: 20px; margin-bottom: 16px; color: #1e3c72; display: flex; justify-content: space-between; align-items: center; }
    .refresh-btn { font-size: 13px; background: #eef2f9; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; color: #2a5298; }
    .refresh-btn:hover { background: #dde6f5; }
    .file-list { list-style: none; }
    .file-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 10px; transition: background 0.15s;
    }
    .file-item:hover { background: #f5f7fa; }
    .file-icon { font-size: 24px; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 12px; color: #999; }
    .btn { border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-download { background: #2a5298; color: #fff; text-decoration: none; }
    .btn-download:hover { background: #1e3c72; }
    .btn-delete { background: #ffe5e5; color: #d33; margin-right: 6px; }
    .btn-delete:hover { background: #ffcccc; }
    .empty { text-align: center; color: #aaa; padding: 30px; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 12px 24px; border-radius: 8px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* צ'אט */
    .name-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .name-row label { font-size: 13px; color: #555; white-space: nowrap; }
    .name-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .chat-box {
      height: 300px; overflow-y: auto; background: #f7f9fc;
      border-radius: 10px; padding: 12px; margin-bottom: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.08); align-self: flex-start; }
    .msg.mine { align-self: flex-end; background: #d6e6ff; }
    .msg .who { font-size: 12px; font-weight: 700; color: #2a5298; margin-bottom: 2px; }
    .msg .txt { font-size: 14px; word-wrap: break-word; white-space: pre-wrap; }
    .msg .when { font-size: 10px; color: #aaa; margin-top: 2px; text-align: left; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .chat-input button { background: #2a5298; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .chat-input button:hover { background: #1e3c72; }
    .chat-empty { text-align: center; color: #aaa; margin: auto; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📁 שיתוף קבצים ברשת</h1>
      <p>העלה קבצים והורד אותם מכל מחשב באותה רשת</p>
    </header>

    <div class="card">
      <div class="dropzone" id="dropzone">
        <div class="icon">⬆️</div>
        <p>גרור קבצים לכאן או לחץ לבחירה</p>
        <small>ניתן להעלות כמה קבצים בבת אחת</small>
      </div>
      <input type="file" id="fileInput" multiple />
      <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="card">
      <h2>
        <span>קבצים זמינים</span>
        <button class="refresh-btn" onclick="loadFiles()">🔄 רענון</button>
      </h2>
      <ul class="file-list" id="fileList"></ul>
    </div>

    <div class="card">
      <h2><span>💬 צ'אט מקומי</span></h2>
      <div class="name-row">
        <label for="nameInput">השם שלך:</label>
        <input type="text" id="nameInput" placeholder="הכנס שם..." maxlength="40" />
      </div>
      <div class="chat-box" id="chatBox">
        <div class="chat-empty">אין הודעות עדיין — כתוב את הראשונה!</div>
      </div>
      <div class="chat-input">
        <input type="text" id="msgInput" placeholder="הקלד הודעה..." maxlength="2000" />
        <button id="sendBtn">שלח</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const fileList = document.getElementById('fileList');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    function iconFor(name) {
      const ext = name.split('.').pop().toLowerCase();
      if (['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext)) return '🖼️';
      if (['mp4','mov','avi','mkv','webm'].includes(ext)) return '🎬';
      if (['mp3','wav','ogg','m4a','flac'].includes(ext)) return '🎵';
      if (['zip','rar','7z','tar','gz'].includes(ext)) return '🗜️';
      if (['pdf'].includes(ext)) return '📕';
      if (['doc','docx','txt','rtf'].includes(ext)) return '📄';
      if (['xls','xlsx','csv'].includes(ext)) return '📊';
      return '📎';
    }

    async function loadFiles() {
      const res = await fetch('/api/files');
      const files = await res.json();
      fileList.innerHTML = '';
      if (!files.length) {
        fileList.innerHTML = '<li class="empty">אין קבצים עדיין — העלה את הראשון!</li>';
        return;
      }
      for (const f of files) {
        const li = document.createElement('li');
        li.className = 'file-item';
        li.innerHTML = `
          <span class="file-icon">${iconFor(f.name)}</span>
          <div class="file-info">
            <div class="file-name">${escapeHtml(f.name)}</div>
            <div class="file-meta">${formatSize(f.size)}</div>
          </div>
          <a class="btn btn-download" href="/api/download/${encodeURIComponent(f.name)}">⬇️ הורדה</a>
          <button class="btn btn-delete" onclick="deleteFile('${encodeURIComponent(f.name)}')">🗑️</button>
        `;
        fileList.appendChild(li);
      }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    async function deleteFile(name) {
      if (!confirm('למחוק את הקובץ?')) return;
      const res = await fetch('/api/files/' + name, { method: 'DELETE' });
      if (res.ok) { showToast('הקובץ נמחק'); loadFiles(); }
      else showToast('שגיאה במחיקה');
    }

    function uploadFiles(files) {
      if (!files.length) return;
      const formData = new FormData();
      for (const f of files) formData.append('files', f);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      progress.style.display = 'block';
      progressBar.style.width = '0%';

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          progressBar.style.width = (e.loaded / e.total * 100) + '%';
        }
      };
      xhr.onload = () => {
        progress.style.display = 'none';
        if (xhr.status === 200) {
          const r = JSON.parse(xhr.responseText);
          showToast(`הועלו ${r.count} קבצים בהצלחה`);
          loadFiles();
        } else showToast('שגיאה בהעלאה');
      };
      xhr.onerror = () => { progress.style.display = 'none'; showToast('שגיאה בהעלאה'); };
      xhr.send(formData);
    }

    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

    ['dragenter', 'dragover'].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.add('dragover'); })
    );
    ['dragleave', 'drop'].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); })
    );
    dropzone.addEventListener('drop', (e) => uploadFiles(e.dataTransfer.files));

    loadFiles();
    setInterval(loadFiles, 5000); // רענון אוטומטי כדי לראות קבצים שהעלו אחרים

    // ---------- צ'אט ----------
    const nameInput = document.getElementById('nameInput');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatBox = document.getElementById('chatBox');
    let lastMsgId = 0;
    let firstLoad = true;

    // שמירת השם ב-localStorage כדי שלא צריך להקליד כל פעם
    nameInput.value = localStorage.getItem('chatName') || '';
    nameInput.addEventListener('change', () => localStorage.setItem('chatName', nameInput.value.trim()));

    function formatTime(ms) {
      const d = new Date(ms);
      return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
    }

    function renderMessage(m) {
      const empty = chatBox.querySelector('.chat-empty');
      if (empty) empty.remove();
      const mine = m.name === (nameInput.value.trim() || 'אנונימי');
      const div = document.createElement('div');
      div.className = 'msg' + (mine ? ' mine' : '');
      div.innerHTML = `
        <div class="who">${escapeHtml(m.name)}</div>
        <div class="txt">${escapeHtml(m.text)}</div>
        <div class="when">${formatTime(m.time)}</div>
      `;
      chatBox.appendChild(div);
    }

    async function loadMessages() {
      try {
        const res = await fetch('/api/messages?since=' + lastMsgId);
        const msgs = await res.json();
        if (msgs.length) {
          const nearBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 80;
          msgs.forEach(renderMessage);
          lastMsgId = msgs[msgs.length - 1].id;
          if (nearBottom || firstLoad) chatBox.scrollTop = chatBox.scrollHeight;
          firstLoad = false;
        }
      } catch (e) { /* התעלמות משגיאות רשת זמניות */ }
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      const name = nameInput.value.trim() || 'אנונימי';
      msgInput.value = '';
      try {
        await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, text }),
        });
        loadMessages();
      } catch (e) { showToast('שגיאה בשליחה'); msgInput.value = text; }
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    loadMessages();
    setInterval(loadMessages, 2000); // בדיקת הודעות חדשות כל 2 שניות
  </script>
</body>
</html>
